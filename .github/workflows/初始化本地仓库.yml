name: 自动同步 OpenWrt 仓库

on:
  # 手动触发
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-repos:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      # 检出当前仓库
      - name: 检出当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 设置工作流权限
      - name: 设置工作流权限
        run: |
          echo "设置工作流权限完成"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 配置Git
      - name: 配置Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          echo "Git配置完成"

      # 清空当前目录除了.git和.github的内容
      - name: 清空当前目录
        run: |
          # 先删除所有文件（保留.git、.github和.sync_history）
          find . -type f -not -path "./.git/*" -not -path "./.github/*" -not -name ".sync_history" -exec rm -f {} \;
          # 再删除所有空目录（保留.git和.github）
          find . -type d -not -path "./.git" -not -path "./.github" -not -path "./.git/*" -not -path "./.github/*" -empty -delete
          echo "目录清理完成"

      # 克隆并同步 openwrt-packages 仓库到当前目录
      - name: 克隆并同步 openwrt-packages 仓库
        run: |
          TARGET_REPO="https://github.com/kenzok8/openwrt-packages.git"
          TEMP_CLONE_DIR="temp_openwrt_packages"
          
          # 清理临时目录
          rm -rf $TEMP_CLONE_DIR || true
          
          # 克隆目标仓库（完整克隆以保持历史）
          git clone $TARGET_REPO $TEMP_CLONE_DIR
          echo "openwrt-packages 仓库克隆完成"
          
          # 获取最新提交信息
          cd $TEMP_CLONE_DIR
          OPENWRT_PACKAGES_COMMIT=$(git rev-parse HEAD)
          OPENWRT_PACKAGES_COMMIT_MSG=$(git log -1 --pretty=%B)
          cd ..
          
          # 将临时目录中的内容移动到当前目录
          mv $TEMP_CLONE_DIR/* . 2>/dev/null || true
          mv $TEMP_CLONE_DIR/.* . 2>/dev/null || true
          echo "openwrt-packages 内容移动完成"
          
          # 清理临时目录
          rm -rf $TEMP_CLONE_DIR || true
          echo "openwrt-packages 临时目录清理完成"
          
          # 记录 openwrt-packages 同步信息
          echo "OPENWRT_PACKAGES_COMMIT=$OPENWRT_PACKAGES_COMMIT" >> .sync_history
          echo "OPENWRT_PACKAGES_COMMIT_MSG=$OPENWRT_PACKAGES_COMMIT_MSG" >> .sync_history

      # 创建并同步 small 仓库到 small 目录
      - name: 克隆并同步 small 仓库
        run: |
          TARGET_REPO="https://github.com/kenzok8/small.git"
          SMALL_DIR="small"
          TEMP_CLONE_DIR="temp_small"
          
          # 清理临时目录和目标目录
          rm -rf $TEMP_CLONE_DIR || true
          rm -rf $SMALL_DIR || true
          mkdir -p $SMALL_DIR
          
          # 克隆目标仓库（完整克隆以保持历史）
          git clone $TARGET_REPO $TEMP_CLONE_DIR
          echo "small 仓库克隆完成"
          
          # 获取最新提交信息
          cd $TEMP_CLONE_DIR
          SMALL_COMMIT=$(git rev-parse HEAD)
          SMALL_COMMIT_MSG=$(git log -1 --pretty=%B)
          cd ..
          
          # 将临时目录中的内容移动到 small 目录
          mv $TEMP_CLONE_DIR/* $SMALL_DIR/ 2>/dev/null || true
          mv $TEMP_CLONE_DIR/.* $SMALL_DIR/ 2>/dev/null || true
          echo "small 内容移动完成"
          
          # 清理临时目录
          rm -rf $TEMP_CLONE_DIR || true
          echo "small 临时目录清理完成"
          
          # 记录 small 同步信息
          echo "SMALL_COMMIT=$SMALL_COMMIT" >> .sync_history
          echo "SMALL_COMMIT_MSG=$SMALL_COMMIT_MSG" >> .sync_history

      # 记录同步时间
      - name: 记录同步时间
        run: |
          echo "SYNC_TIME=$(date '+%Y-%m-%d %H:%M:%S')" >> .sync_history
          echo "同步时间记录完成"

      # 提交并推送更改
      - name: 提交并推送更改
        run: |
          # 检查是否有变更
          if git status --porcelain | grep -q .; then
            # 添加所有变更
            git add .
            
            # 提交变更
            git commit -m "Auto sync: kenzok8/openwrt-packages and kenzok8/small"
            
            # 推送变更
            git push origin main
            echo "同步完成并推送到远程仓库"
          else
            echo "无变更需要推送"
          fi

      # 错误处理
      - name: 错误处理
        if: failure()
        run: |
          echo "同步过程中出现错误，记录详细日志"
          # 记录错误信息到同步历史
          echo "SYNC_ERROR=$(date '+%Y-%m-%d %H:%M:%S')" >> .sync_history
          echo "错误处理完成"

# 工作流说明：
# 1. 触发方式：仅手动触发
# 2. 执行逻辑：
#    - 检出当前仓库
#    - 清空当前目录除了.git和.github的内容
#    - 克隆并同步 openwrt-packages 仓库到当前目录
#    - 创建并同步 small 仓库到 small 目录
#    - 记录同步历史和提交信息
#    - 提交并推送更改到当前仓库
# 3. 注意事项：
#    - 完整克隆仓库以保持文件结构完整性
#    - 详细记录同步日志以便问题排查
#    - 处理可能的冲突情况
#    - 确保依赖库版本兼容性
